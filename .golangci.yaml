version: "2"

run:
  timeout: 3m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    gosec:
      excludes:
        # G104: errcheck linter already covers unhandled error returns.
        - G104
  exclusions:
    rules:
      # Tests can shadow vars / use fixtures freely.
      - path: _test\.go
        linters:
          - gosec
